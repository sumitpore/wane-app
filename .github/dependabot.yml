version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      compose:
        patterns: ["androidx.compose*"]
      androidx:
        patterns: ["androidx.*"]
        exclude-patterns: ["androidx.compose*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "com.google.devtools.ksp*"]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
